name: Publish Dashboards

# Builds the LLM-evaluation dashboards (Leaderboard, ModelStrengths,
# Trend) into _site/ via scripts/BuildSite.wls and deploys the result
# to GitHub Pages.
#
# The dashboards read from data/results/<modelSlug>.json which is
# tracked in git, so this workflow no longer depends on local runs/
# data on the runner host.  scripts/PublishResults.wls (auto-invoked
# by RunBenchmark) is what keeps data/results/ in sync.
#
# (BankQualityReport is intentionally NOT bundled into the public
# site for now.  It still works locally; just isn't linked.)
#
# Trigger paths:
#   - push to main: auto-deploy on every code update
#   - workflow_dispatch: manual rebuild after a new data/results push
#
# GitHub Pages requirement:
#   - For PRIVATE repos: GitHub Pro / Team / Enterprise plan
#   - For PUBLIC repos:  free
#   See docs/PUBLISHING.md for the choice + one-time Pages setup.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages deploys need the right permissions to upload + activate.
permissions:
  contents: read
  pages: write
  id-token: write

# Avoid concurrent deploys clobbering each other.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build site + deploy to Pages
    runs-on: [self-hosted, macOS]
    timeout-minutes: 25

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    env:
      LANG:     en_US.UTF-8
      LC_ALL:   en_US.UTF-8
      LC_CTYPE: UTF-8

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build site
        run: |
          wolframscript -file scripts/BuildSite.wls

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
