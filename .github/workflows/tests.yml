name: Tests

# Runs the paclet's VerificationTest suite on every push and pull request
# against main, plus on manual dispatch. See docs/ci-setup.md for runner
# setup instructions.
#
# The job targets a self-hosted macOS runner because Wolfram Language is
# not pre-installed on GitHub's hosted runners. See the bottom of this
# file for a docker-based hosted alternative you can enable once a
# Wolfram Engine for Developers entitlement is available as a secret.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  # Cancel in-flight runs on the same ref when a newer push arrives; keeps
  # the runner from queueing up redundant test runs on rapid pushes.
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  paclet-tests:
    name: Paclet VerificationTest suite
    runs-on: [self-hosted, macOS]
    timeout-minutes: 20

    # Force UTF-8 locale across all steps. Without this, wolframscript's
    # pre-kernel file reader falls back to Latin-1 under a LaunchAgent's
    # minimal env (LC_CTYPE is unset), which corrupts any source file
    # containing non-ASCII characters (see the VigenereCipher case in
    # Loader.wlt -- the `è` in the test fixture gets double-decoded and
    # canonicalNameKey can no longer fold the diacritic to match the
    # testbank key). Login shells pick up en_US.UTF-8 from macOS
    # defaults; the GitHub Actions runner does not.
    env:
      LANG:     en_US.UTF-8
      LC_ALL:   en_US.UTF-8
      LC_CTYPE: UTF-8

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Report wolframscript version
        run: wolframscript -version

      - name: Run paclet test suite
        id: tests
        run: |
          wolframscript -file WolframChallengesLLMBenchmarkPaclet/Tests/RunTests.wls \
            --junit junit.xml
        env:
          # OpenRouter integration tests use the env var if set; without it,
          # those tests still pass (they're structured to degrade gracefully)
          # but the real-network check stays meaningful when the secret is
          # configured in the repo settings.
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: junit.xml
          if-no-files-found: warn
          retention-days: 30

      - name: Publish test summary
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: junit.xml
          check_name: Paclet tests
          detailed_summary: true
          include_passed: false
          fail_on_failure: true

  # -----------------------------------------------------------------------
  # Bank self-test: run every canonical reference solution against its own
  # tests.  Catches bank-edit mistakes (wrong expected_wl, drifted
  # canonical) before they leak into a real model run.
  #
  # The canonical solutions live in private/canonical_solutions.jsonl,
  # which is gitignored.  In CI we materialize them from a stable local
  # path on the runner machine (BANK_PRIVATE_DIR env, default
  # ~/wclb-private) and copy into the runner workspace.  Refresh with:
  #   mkdir -p ~/wclb-private
  #   cp private/canonical_solutions.jsonl ~/wclb-private/
  # whenever you regenerate the canonical set.
  # -----------------------------------------------------------------------
  bank-self-test:
    name: Bank self-test (canonical solutions pass their own tests)
    runs-on: [self-hosted, macOS]
    needs: paclet-tests
    timeout-minutes: 30
    env:
      LANG:     en_US.UTF-8
      LC_ALL:   en_US.UTF-8
      LC_CTYPE: UTF-8
      BANK_PRIVATE_DIR: ${{ vars.BANK_PRIVATE_DIR }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Stage private canonical solutions
        id: stage
        # Copy the gitignored canonical_solutions.jsonl from a stable path
        # on the runner host into the runner workspace.  Skip the rest of
        # the job (without failing) if the file is not present locally so
        # this never blocks CI on machines that don't have it.
        run: |
          PRIV_DIR="${BANK_PRIVATE_DIR:-$HOME/wclb-private}"
          PRIV_FILE="$PRIV_DIR/canonical_solutions.jsonl"
          if [[ ! -f "$PRIV_FILE" ]]; then
            echo "Canonical file not present at $PRIV_FILE -- skipping bank self-test."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mkdir -p private
          cp "$PRIV_FILE" private/canonical_solutions.jsonl
          echo "Staged $(wc -l < private/canonical_solutions.jsonl) canonical solution records."
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Run bank self-test
        if: steps.stage.outputs.skip != 'true'
        # --fail-under gates CI on the DELTA from the current baseline,
        # not the absolute pass count.  Baseline jumped from 0.39 to
        # 0.57 after the parseHeldWL multi-statement fix; 0.50 leaves
        # ~7% headroom against transient flakes while still catching
        # any regression.  Bank curation to lift the absolute number
        # further (60/166 challenges still have empty canonicals,
        # plus residual value drift) is tracked separately.
        run: |
          wolframscript -file scripts/BankSelfTest.wls --fail-under 0.50

      - name: Upload self-test report
        if: always() && steps.stage.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: bank-self-test-report
          path: runs/bank-self-test/
          if-no-files-found: warn
          retention-days: 30

